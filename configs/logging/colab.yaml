name: colab_mlflow

enabled: true

# In Colab, port 8080 may be occupied by Jupyter Server.
# Use a separate MLflow tracking port inside the Colab runtime.
tracking_uri: http://127.0.0.1:5000
experiment_name: card-recognition-colab
run_name: ${model.name}-${trainer.name}

log_hyperparams: true
log_git_commit: true
log_model: true
log_artifacts: true

plots_artifact_path: plots
checkpoints_artifact_path: checkpoints

save_plots: true
